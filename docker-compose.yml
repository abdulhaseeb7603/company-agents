services:
  paperclip:
    image: company-agents-paperclip
    build:
      context: .
      dockerfile: docker/Dockerfile.paperclip
    ports:
      - ${DASHBOARD_PORT:-3100}:3100
    environment:
      - HOST=0.0.0.0
      - PAPERCLIP_HOME=/paperclip
      - PAPERCLIP_DEPLOYMENT_MODE=authenticated
      - PAPERCLIP_PUBLIC_URL=${PUBLIC_URL:-http://localhost:3100}
      - ANTHROPIC_API_KEY=${LLM_API_KEY:-}
    volumes:
      - paperclip-data:/paperclip
    healthcheck:
      test:
        - CMD
        - curl
        - -sf
        - http://localhost:3100/api/health
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
  zeroclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.zeroclaw
    restart: unless-stopped
    environment:
      - PROVIDER=${LLM_PROVIDER:-openrouter}
      - API_KEY=${LLM_API_KEY}
      - ZEROCLAW_MODEL=${DEFAULT_MODEL:-anthropic/claude-sonnet-4}
      - ZEROCLAW_GATEWAY_PORT=42617
    volumes:
      - zeroclaw-data:/root/.zeroclaw
    command:
      - daemon
    depends_on:
      paperclip:
        condition: service_healthy
    networks:
      - internal
      - llm-egress
      - internet-egress
networks:
  internal:
    internal: true
  llm-egress:
    driver: bridge
  internet-egress:
    driver: bridge
volumes:
  paperclip-data: null
  zeroclaw-data: null
